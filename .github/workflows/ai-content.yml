name: AI Content Generation with Review

on:
  schedule:
    - cron: '0 1 * * 1,3,5'  # Mon/Wed/Fri 9:00 Beijing (UTC+8)
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic/slug'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run RAG content generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic || '' }}
        run: node scripts/rag-generator.js

      - name: Validate generated content
        run: node scripts/validate-content.js

      - name: Check for duplicates
        run: node scripts/check-duplicate.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-content/generated-${{ github.run_number }}
          title: 'AI: New article - ${{ github.event.inputs.topic || env.ARTICLE_TITLE }}'
          body: |
            ## AI Generated Article
            - **Topic**: ${{ github.event.inputs.topic || env.ARTICLE_TITLE }}
            - **Generated by**: Claude RAG pipeline
            - **Validation**: Passed
            - **Duplicate check**: Clean
            ---
            Please review the content before merging.
          labels: ai-content, needs-review
