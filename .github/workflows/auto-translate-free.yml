name: Auto-Translate i18n Files (FREE)
on:
  push:
    paths:
      - 'locales/en.json'
      - '.github/workflows/auto-translate-free.yml'
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to translate (comma separated, e.g., es,de,fr,ar)'
        required: false
        default: 'es,de,fr,ar'

jobs:
  translate:
    name: Auto-Translate i18n Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run auto-translation (FREE API - No API key needed)
        id: translate
        run: |
          echo "🚀 Starting auto-translation with MyMemory API..."
          echo "✅ This API is completely FREE! No API key needed."
          echo "📊 Daily limit: 1000 requests/day"
          echo ""
          
          # Get languages from input or use default
          if [ "${{ github.event.inputs.languages }}" != "" ]; then
            IFS=',' read -ra LANGS <<< "${{ github.event.inputs.languages }}"
          else
            LANGS=("es" "de" "fr" "ar")
          fi
          
          # Run the translation script (uses free MyMemory API)
          node scripts/auto-translate-mymemory.js "${LANGS[@]}"

      - name: Check for changes
        id: git-check
        run: |
          git add locales/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        if: steps.git-check.outputs.changes == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(i18n): auto-translate updates from English'
          title: 'i18n: Auto-translated updates from English (FREE API)'
          body: |
            🤖 This PR contains auto-translated updates from `locales/en.json`.
            
            **Translated languages:** ${{ github.event.inputs.languages || 'es, de, fr, ar' }}
            
            **Translation API:** MyMemory (FREE - No API key needed!)
            - Daily limit: 1000 requests/day
            - Quality: Good for most use cases
            
            ⚠️ Please review the translations for accuracy before merging!
            
            Generated by the Auto-Translate GitHub Action.
          branch: auto-translate/i18n-updates
          delete-branch: true
          labels: |
            i18n
            translation
            automated-pr
