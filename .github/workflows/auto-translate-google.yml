name: Auto-Translate i18n Files (Google Translate - FREE)
on:
  push:
    paths:
      - 'locales/en.json'
      - '.github/workflows/auto-translate-google.yml'
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to translate (comma separated, e.g., es,de,fr,ar)'
        required: false
        default: 'es,de,fr,ar'

jobs:
  translate:
    name: Auto-Translate with Google Translate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run auto-translation (Google Translate - FREE & UNLIMITED)
        id: translate
        env:
          HTTP_PROXY: ${{ secrets.HTTP_PROXY || '' }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY || '' }}
        run: |
          echo "🚀 Starting auto-translation with Google Translate API..."
          echo "✅ COMPLETELY FREE! No registration, no credit card, no limits!"
          echo "✅ Translation quality same as Google Translate web!"
          echo "✅ Supports 100+ languages!"
          echo ""
          
          # Get languages from input or use default
          if [ "${{ github.event.inputs.languages }}" != "" ]; then
            IFS=',' read -ra LANGS <<< "${{ github.event.inputs.languages }}"
          else
            LANGS=("es" "de" "fr" "ar")
          fi
          
          # Run the translation script (uses Google Translate API)
          node scripts/auto-translate-google.js "${LANGS[@]}"

      - name: Check for changes
        id: git-check
        run: |
          git add locales/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        if: steps.git-check.outputs.changes == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(i18n): auto-translate updates from English (Google)'
          title: 'i18n: Auto-translated updates (Google Translate - FREE)'
          body: |
            🤖 This PR contains auto-translated updates from `locales/en.json`.
            
            **Translated languages:** ${{ github.event.inputs.languages || 'es, de, fr, ar' }}
            
            **Translation API:** Google Translate (Hidden API)
            - ✅ **COMPLETELY FREE** - No registration, no credit card, no limits
            - ✅ **Same quality** as Google Translate web version
            - ✅ **100+ languages** supported
            
            ⚠️ Please review the translations for accuracy before merging!
            
            Generated by the Auto-Translate GitHub Action.
          branch: auto-translate/i18n-updates
          delete-branch: true
          labels: |
            i18n
            translation
            automated-pr
