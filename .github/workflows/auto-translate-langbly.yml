name: Auto-Translate i18n Files (Langbly - 500K chars/month FREE)
on:
  push:
    paths:
      - 'locales/en.json'
      - '.github/workflows/auto-translate-langbly.yml'
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to translate (comma separated, e.g., es,de,fr,ar)'
        required: false
        default: 'es,de,fr,ar'

jobs:
  translate:
    name: Auto-Translate i18n Files
    runs-on: ubuntu-latest
    if: ${{ secrets.LANGBLY_API_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run auto-translation (Langbly - 500K chars/month FREE, NO credit card)
        id: translate
        env:
          LANGBLY_API_KEY: ${{ secrets.LANGBLY_API_KEY }}
        run: |
          echo "🚀 Starting auto-translation with Langbly API..."
          echo "✅ FREE TIER: 500,000 characters/month!"
          echo "✅ NO credit card required (email registration only)"
          echo "✅ High quality AI translations"
          echo "✅ 100+ languages supported"
          echo ""
          
          # Get languages from input or use default
          if [ "${{ github.event.inputs.languages }}" != "" ]; then
            IFS=',' read -ra LANGS <<< "${{ github.event.inputs.languages }}"
          else
            LANGS=("es" "de" "fr" "ar")
          fi
          
          # Run the translation script (uses Langbly)
          node scripts/auto-translate-langbly.js "${LANGS[@]}"

      - name: Check for changes
        id: git-check
        run: |
          git add locales/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        if: steps.git-check.outputs.changes == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(i18n): auto-translate updates from English'
          title: 'i18n: Auto-translated updates (Langbly - 500K chars/month FREE)'
          body: |
            🤖 This PR contains auto-translated updates from `locales/en.json`.
            
            **Translated languages:** ${{ github.event.inputs.languages || 'es, de, fr, ar' }}
            
            **Translation API:** Langbly
            - ✅ **FREE: 500,000 characters/month (permanent)**
            - ✅ NO credit card required (email registration only)
            - ✅ AI-powered high quality translations
            - ✅ 100+ languages supported
            
            ⚠️ Please review the translations for accuracy before merging!
            
            Generated by the Auto-Translate GitHub Action.
          branch: auto-translate/i18n-updates
          delete-branch: true
          labels: |
            i18n
            translation
            automated-pr
