name: Scheduled IndexNow Submission

on:
  schedule:
    # 每周一早上8点执行 (UTC 时间，即北京时间16点)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # 允许手动触发

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Generate URLs and submit
        run: |
          node -e "
            const { generateAllUrls, baseUrl } = require('./lib/urls.ts');
            const urls = generateAllUrls();
            
            // 分批提交，每批100个URL
            const batchSize = 100;
            const batches = [];
            for (let i = 0; i < urls.length; i += batchSize) {
              batches.push(urls.slice(i, i + batchSize));
            }
            
            console.log('Total URLs to submit:', urls.length);
            console.log('Number of batches:', batches.length);
            
            // 提交函数
            async function submitBatch(batch, batchIndex) {
              const response = await fetch(process.env.API_URL + '/api/indexnow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  urls: batch,
                  engines: ['bing', 'indexnow'],
                  notify: true
                })
              });
              
              const data = await response.json();
              console.log('Batch ' + (batchIndex + 1) + '/' + batches.length + ':', data.success ? 'Success' : 'Failed');
              return data;
            }
            
            // 主函数
            async function main() {
              for (let i = 0; i < batches.length; i++) {
                await submitBatch(batches[i], i);
                // 每个批次之间等待2秒，避免请求过快
                if (i < batches.length - 1) {
                  await new Promise(r => setTimeout(r, 2000));
                }
              }
              console.log('All submissions completed!');
            }
            
            main().catch(console.error);
          "
        env:
          API_URL: ${{ secrets.API_URL || 'https://www.houseplus-ch.com' }}
